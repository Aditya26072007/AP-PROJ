<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Walley - Invest Smart</title>
  <link rel="stylesheet" href="styl1.css">

  <script>
    function validateForm() {
      let email = document.getElementById("email").value;
      let password = document.getElementById("password").value;

      if (email.indexOf("@") === -1) {
        alert("Email must contain @");
        return false;
      }

      if (password.length < 6) {
        alert("Password must be at least 6 characters");
        return false;
      }

      return true;
    }
  </script>
</head>

<body>

  <div class="navbar">
    <div class="logo">
      <img src="Gemini_Generated_Image_3bub7j3bub7j3bub-removebg-preview.png" alt="Logo">
    </div>
  </div>

  <div class="hero">
    <div class="overlay"></div>

    <div class="content">
      <h1>Invest Now, Make Big Tomorrow</h1>

      <div class="email-box">
        <form action="register.php" method="post" onsubmit="return validateForm()">
          
          <input type="text" id="email" name="email" placeholder="Email address" required><br><br>

          <input type="password" id="password" name="password" placeholder="Password" required><br><br>

          <button type="submit" id="btn">Get Started ></button>

        </form>
      </div>
    </div>
  </div>

</body>
</html>
